<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a"/>
      <stop offset="50%" style="stop-color:#0d1a0d"/>
      <stop offset="100%" style="stop-color:#0a0a16"/>
    </linearGradient>
    <linearGradient id="glow1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00ff88;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#0099ff;stop-opacity:0.05"/>
    </linearGradient>
    <filter id="blur1"><feGaussianBlur stdDeviation="40"/></filter>
    <filter id="blur2"><feGaussianBlur stdDeviation="20"/></filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="600" fill="url(#bg)"/>

  <!-- Glow blobs -->
  <circle cx="200" cy="150" r="200" fill="#00ff88" opacity="0.06" filter="url(#blur1)"/>
  <circle cx="1000" cy="450" r="250" fill="#0099ff" opacity="0.08" filter="url(#blur1)"/>
  <circle cx="600" cy="300" r="180" fill="#00ff88" opacity="0.04" filter="url(#blur1)"/>

  <!-- Grid lines -->
  <g stroke="#00ff88" stroke-width="0.4" opacity="0.08">
    <line x1="0" y1="100" x2="1200" y2="100"/>
    <line x1="0" y1="200" x2="1200" y2="200"/>
    <line x1="0" y1="300" x2="1200" y2="300"/>
    <line x1="0" y1="400" x2="1200" y2="400"/>
    <line x1="0" y1="500" x2="1200" y2="500"/>
    <line x1="150" y1="0" x2="150" y2="600"/>
    <line x1="300" y1="0" x2="300" y2="600"/>
    <line x1="450" y1="0" x2="450" y2="600"/>
    <line x1="600" y1="0" x2="600" y2="600"/>
    <line x1="750" y1="0" x2="750" y2="600"/>
    <line x1="900" y1="0" x2="900" y2="600"/>
    <line x1="1050" y1="0" x2="1050" y2="600"/>
  </g>

  <!-- Floating particles -->
  <circle cx="80" cy="80" r="3" fill="#00ff88" opacity="0.6"/>
  <circle cx="320" cy="45" r="2" fill="#0099ff" opacity="0.5"/>
  <circle cx="560" cy="120" r="4" fill="#00ff88" opacity="0.4"/>
  <circle cx="780" cy="60" r="2" fill="#00ff88" opacity="0.7"/>
  <circle cx="1050" cy="90" r="3" fill="#0099ff" opacity="0.5"/>
  <circle cx="1150" cy="200" r="2" fill="#00ff88" opacity="0.4"/>
  <circle cx="40" cy="400" r="3" fill="#0099ff" opacity="0.3"/>
  <circle cx="180" cy="520" r="2" fill="#00ff88" opacity="0.5"/>
  <circle cx="900" cy="540" r="4" fill="#0099ff" opacity="0.3"/>
  <circle cx="1100" cy="500" r="3" fill="#00ff88" opacity="0.4"/>

  <!-- Hexagonal decorations -->
  <polygon points="950,180 980,163 1010,180 1010,214 980,231 950,214" fill="none" stroke="#00ff88" stroke-width="1" opacity="0.2"/>
  <polygon points="100,350 120,338 140,350 140,374 120,386 100,374" fill="none" stroke="#0099ff" stroke-width="1" opacity="0.2"/>
  <polygon points="1100,300 1125,286 1150,300 1150,328 1125,342 1100,328" fill="none" stroke="#00ff88" stroke-width="1" opacity="0.15"/>

  <!-- Code bracket decorations -->
  <text x="60" y="280" font-family="monospace" font-size="80" fill="#00ff88" opacity="0.06">{</text>
  <text x="1100" y="380" font-family="monospace" font-size="80" fill="#0099ff" opacity="0.06">}</text>

  <!-- Diagonal accent line -->
  <line x1="0" y1="600" x2="600" y2="0" stroke="#00ff88" stroke-width="0.5" opacity="0.05"/>
  <line x1="600" y1="600" x2="1200" y2="0" stroke="#0099ff" stroke-width="0.5" opacity="0.05"/>

  <!-- Bottom green line accent -->
  <line x1="0" y1="598" x2="1200" y2="598" stroke="#00ff88" stroke-width="2" opacity="0.3"/>
</svg>